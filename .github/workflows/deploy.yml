name: Deploy Static HTML to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

# กำหนดสิทธิ์สำหรับ GitHub Actions
permissions:
  contents: read
  pages: write
  id-token: write

# ป้องกันไม่ให้มี Action รันซ้ำซ้อนกันหลายรอบ
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # ชี้ไปที่ root ของ repository
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
